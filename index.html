<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Library Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --panel-bg: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-color: #a855f7;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --font-display: 'Outfit', sans-serif;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
      color: var(--text-main);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 1000px;
      margin-bottom: 3rem;
      text-align: center;
    }

    header h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    main {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    @media (min-width: 768px) {
      main {
        grid-template-columns: 2fr 1fr;
      }
    }

    .card {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      background: rgba(168, 85, 247, 0.15);
      color: var(--accent-color);
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      border: 1px solid rgba(168, 85, 247, 0.3);
    }

    /* Showcase area */
    .preview-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px dashed var(--border-color);
      border-radius: 12px;
      padding: 3rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 200px;
      margin-bottom: 1.5rem;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .control-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-main);
      padding: 0.6rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .control-group input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
    }

    /* Event console panel */
    .console-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .console-logs {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      flex-grow: 1;
      font-family: monospace;
      font-size: 0.85rem;
      overflow-y: auto;
      max-height: 250px;
      min-height: 150px;
      color: #34d399;
    }

    .console-log-entry {
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      padding-bottom: 0.25rem;
      word-break: break-all;
    }

    .console-log-entry .time {
      color: var(--text-muted);
      margin-right: 0.5rem;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>

  <header>
    <h1>Frontend Lib Playground</h1>
    <p>Interaktivní testovací prostředí pro knihovnu komponent</p>
  </header>

  <main>
    <!-- Component Showcase -->
    <section class="card">
      <div class="card-title">
        <span>Button Component</span>
        <span class="badge">Vanilla JS/TS</span>
      </div>

      <div class="preview-box" id="button-preview">
        <!-- Rendered button will appear here -->
      </div>

      <div class="controls-grid">
        <div class="control-group">
          <label for="btn-label-input">Text tlačítka (Label)</label>
          <input type="text" id="btn-label-input" value="Klikni na mě">
        </div>
      </div>
    </section>

    <!-- Event Logs -->
    <section class="card console-panel">
      <div class="card-title">
        <span>Event Log</span>
        <button class="clear-btn" id="clear-console">Smazat</button>
      </div>
      <div class="console-logs" id="console-logs">
        <div class="console-log-entry">
          <span class="time">[System]</span>Playground spuštěn. Klikněte na tlačítko vlevo.
        </div>
      </div>
    </section>
  </main>

  <!-- Load our local development entry point -->
  <script type="module" src="/src/playground.ts"></script>
</body>
</html>
